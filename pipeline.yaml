apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  tasks:
    - name: install-dependencies
      taskRef:
        name: npm-install
    - name: run-unit-tests
      taskRef:
        name: jasmine-test
      runAfter:
        - install-dependencies
    - name: build-docker-image
      taskRef:
        name: build-and-push
      runAfter:
        - run-unit-tests
